<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Select Genre</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: url("/static/photo2.jpg") no-repeat center center fixed;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .container {
    background-color: rgba(255,255,255,0.1);
    backdrop-filter: blur(5px);
    padding: 25px;
    border-radius: 8px;
    width: 300px;
    text-align: center;
    color: white;
    font-family: "Brush Script MT", cursive;
    font-size: 30px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  }
  select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    font-size: 16px;
    border-radius: 5px;
    border: 1px solid #ccc;
  }
  button {
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
  }
  button:hover { background: #0056b3; }
</style>
</head>
<body>
<div class="container">
  <h2>Select Genre</h2>
  <form method="POST">
    <select name="genre" required>
      {% for g in genres %}
      <option value="{{ g }}">{{ g }}</option>
      {% endfor %}
    </select>
    <button type="submit">Start Quiz</button>
  </form>
</div>
</body>
</html>
