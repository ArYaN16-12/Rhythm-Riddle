<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Select Language</title>
<style>
  body {
    font-family: Arial, sans-serif;
   background: url("/static/photo2.jpg") no-repeat center center fixed;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .box {
    background-color: rgba(255,255,255,0.1);
    backdrop-filter: blur(5px);
    padding: 25px;
    border-radius: 8px;
    width: 300px;
    text-align: center;
    color: white;
    font-family: "Brush Script MT", cursive;
    font-size: 30px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  }
  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
    color: white;
  }
  .english-btn { background: #2196f3; }
  .hindi-btn { background: rgb(13,13,81); }
  button:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="box">
  <h2>Select Language</h2>
  <form method="POST">
    <button type="submit" name="language" value="English" class="english-btn">English</button>
    <button type="submit" name="language" value="Hindi" class="hindi-btn">Hindi</button>
  </form>
</div>
</body>
</html>
